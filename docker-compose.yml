version: '3'
services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase_app
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabaseappdb
      - MB_DB_PORT=5432
      - MB_DB_USER=user
      - MB_DB_PASS=senha
      - MB_DB_HOST=banco-rds-endpoint.aws.com
